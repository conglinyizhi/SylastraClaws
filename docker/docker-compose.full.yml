services:
  # ─────────────────────────────────────────────
  # SylastraClaws Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm sylastraclaws-agent -m "Hello"
  # ─────────────────────────────────────────────
  sylastraclaws-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: sylastraclaws-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.sylastraclaws/config.json:ro
      - sylastraclaws-workspace:/root/.sylastraclaws/workspace
      - sylastraclaws-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["sylastraclaws", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # SylastraClaws Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  sylastraclaws-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: sylastraclaws-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.sylastraclaws/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - sylastraclaws-workspace:/root/.sylastraclaws/workspace
      # NPM cache for faster MCP server installs
      - sylastraclaws-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  sylastraclaws-workspace:
  sylastraclaws-npm-cache: # Cache npm packages to speed up MCP server installations
