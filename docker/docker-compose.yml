services:
  # ─────────────────────────────────────────────
  # SylastraClaws Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm sylastraclaws-agent -m "Hello"
  # ─────────────────────────────────────────────
  sylastraclaws-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: docker.io/conglinyizhi/sylastraclaws:latest
    container_name: sylastraclaws-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.sylastraclaws
    entrypoint: ["sylastraclaws", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # SylastraClaws Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  sylastraclaws-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: docker.io/conglinyizhi/sylastraclaws:latest
    container_name: sylastraclaws-gateway
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.sylastraclaws

  # ─────────────────────────────────────────────
  # SylastraClaws Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  sylastraclaws-launcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile.launcher
    image: docker.io/conglinyizhi/sylastraclaws:launcher
    container_name: sylastraclaws-launcher
    restart: unless-stopped
    profiles:
      - launcher
    environment:
      - SYLASTRACLAWS_GATEWAY_HOST=0.0.0.0
      # Set a fixed dashboard token instead of a random one each restart.
      # If not set, a random token is generated and printed to the console on startup.
      #- SYLASTRACLAWS_LAUNCHER_TOKEN=your-secret-token-here
    ports:
      - "18800:18800"
      - "18790:18790"
    volumes:
      - ./data:/root/.sylastraclaws
