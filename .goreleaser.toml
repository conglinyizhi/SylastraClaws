version = 2

[git]
ignore_tags = ["nightly", ".*-nightly.*"]

[before]
hooks = [
  "go generate ./...",
]

[[builds]]
id = "picoclaw"
env = ["CGO_ENABLED=0"]
tags = ["goolm", "stdjson"]
ldflags = [
  "-s -w",
  "-X github.com/sipeed/picoclaw/pkg/config.Version={{ .Version }}",
  "-X github.com/sipeed/picoclaw/pkg/config.GitCommit={{ .ShortCommit }}",
  "-X github.com/sipeed/picoclaw/pkg/config.BuildTime={{ .Date }}",
  "-X github.com/sipeed/picoclaw/pkg/config.GoVersion={{ with index .Env \"GOVERSION\" }}{{ . }}{{ else }}unknown{{ end }}",
]
goos = ["linux", "windows", "darwin", "freebsd", "netbsd"]
goarch = ["amd64", "arm64", "riscv64", "loong64", "arm", "s390x", "mipsle"]
goarm = ["6", "7"]
gomips = ["softfloat"]
main = "./cmd/picoclaw"

[[builds.ignore]]
goos = "windows"
goarch = "arm"

[[builds.ignore]]
goos = "netbsd"
goarch = "s390x"

[[builds.ignore]]
goos = "netbsd"
goarch = "mips64"

[[builds.ignore]]
goos = "netbsd"
goarch = "arm"

[[builds]]
id = "picoclaw-launcher"
binary = "picoclaw-launcher"
env = ["CGO_ENABLED=0"]
tags = ["goolm", "stdjson"]
ldflags = [
  "-s -w",
  "-X github.com/sipeed/picoclaw/pkg/config.Version={{ .Version }}",
  "-X github.com/sipeed/picoclaw/pkg/config.GitCommit={{ .ShortCommit }}",
  "-X github.com/sipeed/picoclaw/pkg/config.BuildTime={{ .Date }}",
  "-X github.com/sipeed/picoclaw/pkg/config.GoVersion={{ with index .Env \"GOVERSION\" }}{{ . }}{{ else }}unknown{{ end }}",
]
goos = ["linux", "windows", "darwin", "freebsd", "netbsd"]
goarch = ["amd64", "arm64", "riscv64", "loong64", "arm", "s390x", "mipsle"]
goarm = ["6", "7"]
gomips = ["softfloat"]
main = "./web/backend"

[[builds.ignore]]
goos = "windows"
goarch = "arm"

[[builds.ignore]]
goos = "netbsd"
goarch = "s390x"

[[builds.ignore]]
goos = "netbsd"
goarch = "mips64"

[[builds.ignore]]
goos = "netbsd"
goarch = "arm"

[[dockers_v2]]
id = "picoclaw"
dockerfile = "docker/Dockerfile.goreleaser"
extra_files = ["docker/entrypoint.sh"]
ids = ["picoclaw"]
images = [
  "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/picoclaw",
  "docker.io/{{ .Env.DOCKERHUB_IMAGE_NAME }}",
]
tags = [
  "{{ if isEnvSet \"NIGHTLY_BUILD\" }}nightly{{ else }}{{ .Tag }}{{ end }}",
  "{{ if isEnvSet \"NIGHTLY_BUILD\" }}nightly{{ else }}latest{{ end }}",
]
platforms = ["linux/amd64", "linux/arm64", "linux/riscv64"]

[[dockers_v2]]
id = "picoclaw-launcher"
dockerfile = "docker/Dockerfile.goreleaser.launcher"
ids = ["picoclaw", "picoclaw-launcher"]
images = [
  "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/picoclaw",
  "docker.io/{{ .Env.DOCKERHUB_IMAGE_NAME }}",
]
tags = [
  "{{ if isEnvSet \"NIGHTLY_BUILD\" }}nightly-launcher{{ else }}{{ .Tag }}-launcher{{ end }}",
  "{{ if isEnvSet \"NIGHTLY_BUILD\" }}nightly-launcher{{ else }}launcher{{ end }}",
]
platforms = ["linux/amd64", "linux/arm64", "linux/riscv64"]

[[notarize.macos]]
enabled = "{{ isEnvSet \"MACOS_SIGN_P12\" }}"
ids = ["picoclaw", "picoclaw-launcher"]

[notarize.macos.sign]
certificate = "{{.Env.MACOS_SIGN_P12}}"
password = "{{.Env.MACOS_SIGN_PASSWORD}}"

[notarize.macos.notarize]
issuer_id = "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
key_id = "{{.Env.MACOS_NOTARY_KEY_ID}}"
key = "{{.Env.MACOS_NOTARY_KEY}}"
wait = true
timeout = "20m"

[[archives]]
formats = ["tar.gz"]
name_template = "{{ .ProjectName }}_{{ title .Os }}_{{ if eq .Arch \"amd64\" }}x86_64{{ else if eq .Arch \"386\" }}i386{{ else }}{{ .Arch }}{{ end }}{{ if .Arm }}v{{ .Arm }}{{ end }}"

[[archives.format_overrides]]
goos = "windows"
formats = ["zip"]

[[nfpms]]
id = "picoclaw"
ids = ["picoclaw", "picoclaw-launcher"]
package_name = "picoclaw"
file_name_template = "{{ .PackageName }}_{{ if eq .Arch \"amd64\" }}x86_64{{ else if eq .Arch \"arm64\" }}aarch64{{ else if eq .Arch \"arm\" }}armv{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}"
vendor = "picoclaw"
homepage = "https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/picoclaw"
maintainer = "picoclaw contributors"
description = "picoclaw - a tool for managing and running tasks"
license = "MIT"
formats = ["rpm", "deb"]
bindir = "/usr/bin"

[[nfpms.contents]]
src = "web/picoclaw-launcher.desktop"
dst = "/usr/share/applications/picoclaw-launcher.desktop"

[[nfpms.contents]]
src = "web/picoclaw-launcher.png"
dst = "/usr/share/icons/hicolor/512x512/apps/picoclaw-launcher.png"

[changelog]
sort = "asc"

[changelog.filters]
exclude = ["^docs:", "^test:"]

[release]
disable = "{{ isEnvSet \"NIGHTLY_BUILD\" }}"

[[release.extra_files]]
glob = "./build/picoclaw-android-universal.zip"

[release.footer]
template = """

---

Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
"""
